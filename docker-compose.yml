# RabbitMQ broker + Prometheus + shared bridge network for gateway, notification, retry-orchestrator, etc.
#
# Usage: ``docker compose up -d``
# Copy ``.env.example`` → ``.env``. Management UI: http://localhost:${RABBITMQ_MANAGEMENT_PORT}.
# Prometheus UI: http://localhost:${PROMETHEUS_PORT}.

services:
  rabbitmq:
    image: ${RABBITMQ_IMAGE}
    container_name: event-platform-rabbitmq
    env_file:
      - .env
    command: >
      sh -c "rabbitmq-plugins enable rabbitmq_prometheus && rabbitmq-server"
    ports:
      - "${RABBITMQ_AMQP_PORT}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"
      - "${RABBITMQ_PROMETHEUS_PORT}:15692"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    networks:
      - event-platform
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: event-platform-prometheus
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped
    networks:
      - event-platform
    depends_on:
      rabbitmq:
        condition: service_healthy

networks:
  event-platform:
    name: ${EVENT_PLATFORM_NETWORK_NAME}
    driver: bridge

volumes:
  rabbitmq_data:
  prometheus_data:
