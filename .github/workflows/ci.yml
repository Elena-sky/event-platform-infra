name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare env for compose interpolation
        run: cp .env.example .env

      - name: Validate Docker Compose
        run: docker compose config --quiet
