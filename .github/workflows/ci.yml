name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate-compose:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare env files
        run: |
          cp .env.example .env
          cp services/gateway.env.example           services/gateway.env
          cp services/notification.env.example      services/notification.env
          cp services/analytics-audit.env.example   services/analytics-audit.env
          cp services/retry-orchestrator.env.example services/retry-orchestrator.env
          echo "DOCKER_PLATFORM_INFRA=linux/amd64" >> .env
          echo "DOCKER_PLATFORM_APP=linux/amd64" >> .env

      - name: Validate docker-compose.yml
        run: docker compose config --quiet

      - name: Validate docker-compose.rabbitmq-cluster.yml
        run: |
          export COMPOSE_PROJECT_NAME=event-platform-rmq-cluster
          docker compose -f docker-compose.rabbitmq-cluster.yml config --quiet
